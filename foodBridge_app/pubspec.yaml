name: foodbridge_app
description: FoodBridge AI Web & Android Prototype
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase dependencies
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12

  # Maps & location
  flutter_map: ^6.2.1
  latlong2: ^0.9.1
  proj4dart: ^2.1.0
  mgrs_dart: ^2.0.0

  # Image & HTTP
  image_picker: ^1.2.1
  image_picker_for_web: ^3.1.1
  http: ^1.2.2
  mime: ^2.0.0

  # Utilities
  intl: ^0.20.2
  unicode: ^0.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true